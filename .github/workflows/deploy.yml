name: Build and Deploy OCaml to GitHub Pages

on:
  push:
    branches:
      - main # Change to 'master' if your default branch is named that

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.1.x

      - name: Install dependencies
        run: |
          opam install dune js_of_ocaml js_of_ocaml-ppx brr --yes

      - name: Build JS
        run: opam exec -- dune build src/main.bc.js

      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p dist/js
          cp _build/default/src/main.bc.js dist/js/script.js
          cp index.html dist/
          # Copy static folders
          if [ -d "css" ]; then cp -r css dist/; fi
          if [ -d "assets" ]; then cp -r assets dist/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
