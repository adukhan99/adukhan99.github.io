name: Build and Deploy OCaml to GitHub Pages

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.1.x

      - name: Install dependencies
        run: |
          opam install dune js_of_ocaml js_of_ocaml-ppx brr --yes

      - name: Build JS
        run: |
          opam exec -- dune build src/main.bc.js
          opam exec -- dune build src/resume.bc.js

      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p dist/js dist/assets
          cp _build/default/src/main.bc.js dist/js/script.js
          cp _build/default/src/resume.bc.js dist/js/resume.bc.js
          cp index.html dist/
          cp resume.html dist/
          if [ -d "assets" ]; then cp -r assets dist/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
